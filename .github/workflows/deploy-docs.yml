name: Deploy docs site

# Builds the Vite app (landing + gallery + docs + showcase) and publishes it to
# GitHub Pages. The docs site (M5) is the public `homepage`. Runs on push to main
# and can be triggered manually.
#
# NOTE: this requires Pages to be enabled for the repo with "GitHub Actions" as
# the source (Settings -> Pages). Until then the deploy job is a no-op failure.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow one concurrent deployment; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      # Build under the project subpath so asset URLs resolve on Pages, then add
      # a SPA fallback so BrowserRouter deep links (e.g. /docs/iridescent) work.
      - name: Build site
        run: pnpm build:site
        env:
          DOCS_BASE: /easy-3dkit/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist-site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
