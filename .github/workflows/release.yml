name: Release

# Changesets-driven releases. Manual-only (workflow_dispatch): publishing is
# currently done by hand (`pnpm changeset:version` then `npm publish`), so this
# must NOT auto-run on push or it would race the manual publish. Switch the
# trigger back to `push: branches: [main]` to automate once an NPM_TOKEN secret
# with publish rights is set; then merging the "Version Packages" PR publishes.
on:
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile

      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          version: pnpm changeset:version
          publish: pnpm changeset:publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
